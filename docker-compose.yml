services:
  backend:
    build: ./backend
    container_name: lognexa-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - backend_data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/lognexa.db
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173,http://localhost:5174,http://frontend
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - GROQ_BASE_URL=${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      - VECTOR_ENABLED=true
      - QDRANT_URL=http://qdrant:6333
      - VECTOR_COLLECTION=lognexa_logs
      - VECTOR_MODEL=BAAI/bge-small-en-v1.5
      - VECTOR_TIMEOUT=10
      - RAG_CONTEXT_LIMIT=6
      - COLLECTOR_EXCLUDE_SERVICES=${COLLECTOR_EXCLUDE_SERVICES:-backend,qdrant,frontend}
      - LOG_LEVEL=info
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
      - service-a
      - service-b

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=/api
        - VITE_SSE_URL=/api/stream/logs
    container_name: lognexa-frontend
    restart: unless-stopped
    profiles: ["frontend"]
    ports:
      - "3000:80"
    depends_on:
      - backend

  service-a:
    build: ./sample-services/service-a
    container_name: lognexa-service-a
    restart: unless-stopped
    environment:
      - PORT=3001
    ports:
      - "3001:3001"

  service-b:
    build: ./sample-services/service-b
    container_name: lognexa-service-b
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: lognexa-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  backend_data:
  qdrant_data:
